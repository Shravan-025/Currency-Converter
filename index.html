<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer"/>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔄</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form action="">
            <div class="heading">
                <h2>Currency Converter</h2>
            </div>
            <div class="Txt_box">
                <p class="txt">Enter Amount:</p>
                <input type="number" name="Amt" id="Amt" required>
            </div>
            <div class="dropdown">
            <div class="from">
                <p>From:</p>
                
                <div class="select_container">
                    <img class="frm" src="https://flagsapi.com/US/flat/64.png">
                    <select name="frm" id="frm">

                    </select>
                </div>
            </div>
            <i class="fa-solid fa-arrow-right-arrow-left icon"></i>
            <div class="to">
                <p>To:</p>
                
                <div class="select_container">
                    <img class="to" src="https://flagsapi.com/IN/flat/64.png">
                    <select name="to" id="to">
                        
                    </select>
                </div>
            </div>
            </div>
            <div class="message">
                Exchange Rate: 1 USD = 90 Ruppe
            </div>
            <div class="submit">
                <input class="btn" type="submit" value="Get Exchange Rate">
            </div>
        </form>
        
    </div>
    <script  src="Codes.js"></script>
    <script  src="script.js"></script>
</body>
</html>
